<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Your Catnip 🐟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff; /* Changed to White */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            /* Added a light border and softened the shadow */
            border: 2px solid #e0d4ff; 
            box-shadow: 0 15px 40px rgba(171, 147, 255, 0.15);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .cat-container {
            margin: 20px 0;
        }

        .cat-container img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: none;
            transition: transform 0.3s;
        }

        .cat-container img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .cat-container.working img {
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 5px;
        }

        .btn-start {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            width: 100%;
            font-size: 18px;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(17, 153, 142, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            width: 100%;
            font-size: 18px;
        }

        .btn-stop:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(235, 51, 73, 0.4);
        }

        .btn-reset, .btn-history {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-reset:hover, .btn-history:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        /* Screens Setup */
        .timer-screen, .result-screen, .history-screen {
            display: none;
        }

        .money-display {
            font-size: 3.5em;
            font-weight: bold;
            color: #11998e;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .money-display::before {
            content: 'RM';
            font-size: 0.5em;
            vertical-align: top;
        }

        .time-display {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .rate-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 0.9em;
            color: #666;
        }

        .result-amount {
            font-size: 4em;
            font-weight: bold;
            color: #eb3349;
            margin: 20px 0;
        }

        .result-amount::before {
            content: 'RM';
            font-size: 0.6em;
            vertical-align: top;
        }

        .result-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }

        .result-details p {
            margin: 10px 0;
            color: #555;
        }

        .celebration {
            font-size: 2em;
            margin: 10px 0;
        }

        /* History Screen Styles */
        .history-stats {
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .stat-box {
            text-align: center;
            flex: 1;
        }

        .stat-box span {
            display: block;
            font-size: 1.2em; /* slightly smaller so the text fits nicely */
            font-weight: bold;
            color: #11998e;
        }

        .stat-box p {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
            border: 2px solid #f8f9fa;
            border-radius: 10px;
            padding: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        
        .button-group {
            display: flex;
            justify-content: center;
        }

.dj-cat {
            width: 200px;
            border-radius: 15px;
            margin: 15px auto;
            display: block;
            box-shadow: 0 10px 25px rgba(171, 147, 255, 0.4);
            animation: floatCat 3s ease-in-out infinite;
        }

        @keyframes floatCat {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

    </style>
</head>
<body>
    <div class="container">
        <div id="inputScreen" class="input-screen">
            <h1>Gimme Meow-ney /ᐠ - ˕ -マ</h1>

            <div class="input-group">
                <label>💵 Salary (RM)</label>
                <input type="number" id="salary" placeholder="E.g: 10000" value="10000">
            </div>

            <div class="input-group">
                <label>⏰ Working Hours</label>
                <input type="number" id="hoursPerDay" placeholder="E.g: 8" value="8">
            </div>

            <div class="input-group">
                <label>📅 Working Days</label>
                <input type="number" id="daysPerMonth" placeholder="E.g: 22" value="22">
            </div>

            <button class="btn btn-start" onclick="startWork()">Welcome to HELL✨</button>
            <button class="btn btn-history" style="width: 100%; margin-top: 0;" onclick="viewHistory()">📊 View History</button>
        </div>

        <div id="timerScreen" class="timer-screen">
            <h1>努力搬砖中... 🧱</h1>
            
            <div class="cat-container working" id="workingCat">
                <img src="https://cataas.com/cat/cute" alt="可爱的猫咪" id="catImage">
            </div>

            <div class="money-display" id="moneyDisplay">0.0000</div>
            
            <div class="time-display">
                已工作: <span id="timeDisplay">00:00:00</span>
            </div>

            <button class="btn btn-stop" onclick="stopWork()"> BALIKKK 🔥</button>
        </div>

        <div id="resultScreen" class="result-screen">
            <h1>今日躺平🐈</h1>

            <div class="celebration">
                <img src="https://media.tenor.com/tLF__YybpV0AAAAj/dj-cat.gif" alt="DJ Cat" class="dj-cat">
            </div> <div class="result-amount" id="resultAmount">0.00</div>

            <div class="result-details">
                <p>📅 工作时长: <strong id="resultTime">0</strong></p>
                <p>💰 每秒收入: <strong>RM<span id="resultRate">0</span></strong></p>
                <p>🤑 今日入账: <strong>RM<span id="resultEarned">0</span></strong></p>
            </div>

            <div class="button-group">
                <button class="btn btn-reset" onclick="resetTimer()">Bye</button>
                <button class="btn btn-history" onclick="viewHistory()">📊 View History</button>
            </div>
        </div>

        <div id="historyScreen" class="history-screen">
            <h1>Working History 📈</h1>
         
            <div class="history-stats">
                <div class="stat-box">
                    <span id="totalDays">0</span>
                    <p>总天数 (Days)</p>
                </div>
                <div class="stat-box">
                    <span id="totalHours">0</span>
                    <p>总时长 (Hours)</p>
                </div>
                <div class="stat-box">
                    <span id="totalMoney">0</span>
                    <p>总收入 (RM)</p>
                </div>
            </div>

            <div class="history-list" id="historyList">
                </div> 
            
            <button class="btn btn-reset" onclick="goHomeFromHistory()" style="width: 100%">Back</button> 
            <button class="btn btn-stop" onclick="clearHistory()" style="width: 100%; margin-top: 10px;">Clear History</button> 
        </div>


    <script>
        let timerInterval;
        let startTime;
        let ratePerSecond;
        let totalEarned = 0;

        function startWork() {
            const salary = parseFloat(document.getElementById('salary').value);
            const hoursPerDay = parseFloat(document.getElementById('hoursPerDay').value);
            const daysPerMonth = parseFloat(document.getElementById('daysPerMonth').value);

            if (!salary || !hoursPerDay || !daysPerMonth) {
                alert('Please fill in ALL information！');
                return;
            }

            // Calculate rate per second
            const totalWorkSecondsPerMonth = daysPerMonth * hoursPerDay * 3600;
            ratePerSecond = salary / totalWorkSecondsPerMonth;
           // document.getElementById('ratePerSecond').textContent = ratePerSecond.toFixed(6);

            // Switch screens
            document.getElementById('inputScreen').style.display = 'none';
            document.getElementById('timerScreen').style.display = 'block';

            // Start timer
            startTime = Date.now();
            totalEarned = 0;

            timerInterval = setInterval(updateTimer, 100); 
        }

        function updateTimer() {
            const elapsed = (Date.now() - startTime) / 1000;
            totalEarned = elapsed * ratePerSecond;
            
            // Update money display
            document.getElementById('moneyDisplay').textContent = totalEarned.toFixed(4);
            
            // Update time display
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = Math.floor(elapsed % 60);
            document.getElementById('timeDisplay').textContent = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function stopWork() {
            clearInterval(timerInterval);
            const elapsed = (Date.now() - startTime) / 1000;
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = Math.floor(elapsed % 60);
            
            // Switch to result screen
            document.getElementById('timerScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            // Update result display
            document.getElementById('resultAmount').textContent = totalEarned.toFixed(2);
            document.getElementById('resultTime').textContent = `${hours}小时 ${minutes}分钟 ${seconds}秒`;
            document.getElementById('resultRate').textContent = ratePerSecond.toFixed(6);
            document.getElementById('resultEarned').textContent = totalEarned.toFixed(2);

            // NEW: Save data to LocalStorage
            saveWorkSession(elapsed, totalEarned);
        }

        function resetTimer() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('inputScreen').style.display = 'block';
            totalEarned = 0;
        }

        // --- NEW FEATURES: History & Data Saving ---

        function saveWorkSession(durationSeconds, earnedAmount) {
            // Retrieve existing history from local storage (or create an empty array if none exists)
            let history = JSON.parse(localStorage.getItem('workHistory')) || [];
            
            const today = new Date();
            const dateString = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2, '0')}-${today.getDate().toString().padStart(2, '0')}`;

            // Push new session
            history.push({
                date: dateString,
                duration: durationSeconds,
                earned: earnedAmount
            });

            // Save back to local storage
            localStorage.setItem('workHistory', JSON.stringify(history));
        }

        function viewHistory() {
            document.getElementById('inputScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'block';

            let history = JSON.parse(localStorage.getItem('workHistory')) || [];
            
            let totalSecs = 0;
            let totalMoney = 0;
            let uniqueDays = new Set();
            let historyHtml = '';

            // Reverse to show the newest entries at the top
            history.slice().reverse().forEach((session) => {
                totalSecs += session.duration;
                totalMoney += session.earned;
                uniqueDays.add(session.date);

                const h = Math.floor(session.duration / 3600);
                const m = Math.floor((session.duration % 3600) / 60);

                historyHtml += `
                    <div class="history-item">
                        <span>📅 ${session.date}</span>
                        <span>⏱️ ${h}h ${m}m</span>
                        <span style="color:#11998e; font-weight:bold;">RM ${session.earned.toFixed(4)}</span>
                    </div>
                `;
            });

            // Update the top stats boxes
            document.getElementById('totalDays').textContent = uniqueDays.size;
            
            // NEW: Calculate exact hours and minutes for the total
            const totalH = Math.floor(totalSecs / 3600);
            const totalM = Math.floor((totalSecs % 3600) / 60);
            document.getElementById('totalHours').textContent = `${totalH}h ${totalM}m`;
            
            document.getElementById('totalMoney').textContent = totalMoney.toFixed(4);

            // Populate the list
            const listContainer = document.getElementById('historyList');
            if(historyHtml === '') {
                listContainer.innerHTML = '<p style="text-align:center; padding: 20px; color: #666;">暂无工作记录 (No history yet)</p>';
            } else {
                listContainer.innerHTML = historyHtml;
            }
        }

        function goHomeFromHistory() {
            document.getElementById('historyScreen').style.display = 'none';
            document.getElementById('inputScreen').style.display = 'block';
        }

function clearHistory() {
            // Ask for confirmation before deleting
            if (confirm("Are you sure you want to clear all history?")) {
                // This removes the data from your browser's storage
                localStorage.removeItem('workHistory');
                
                // Refresh the history screen to show it's empty
                viewHistory(); 
            }
        }

// ==========================================
        // ✨ GLITTER BACKGROUND EFFECT ✨
        // ==========================================
        const canvas = document.createElement('canvas');
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
        canvas.style.zIndex = '-1'; // Keeps it behind your white box
        canvas.style.pointerEvents = 'none'; // Prevents it from blocking button clicks
        document.body.appendChild(canvas);

        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5; // Size of glitter particles
                this.speedX = Math.random() * 0.8 - 0.4; // Drift speed horizontally
                this.speedY = Math.random() * 0.8 - 0.4; // Drift speed vertically
                this.opacity = Math.random();
                this.fadeDirection = Math.random() < 0.5 ? 1 : -1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Twinkling effect
                this.opacity += 0.015 * this.fadeDirection;
                if (this.opacity >= 1) this.fadeDirection = -1;
                if (this.opacity <= 0.1) this.fadeDirection = 1;

                // Wrap around the screen so they never run out
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                // Light purple color with dynamic opacity
                ctx.fillStyle = `rgba(171, 147, 255, ${this.opacity})`; 
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initGlitter() {
            particlesArray = [];
            // Change the number 150 to add more or less glitter
            for (let i = 0; i < 150; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateGlitter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateGlitter);
        }

        initGlitter();
        animateGlitter();
    </script>
</body>
</html>
