name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js from secrets
        run: |
          cat > docs/config.js << 'EOF'
          /**
           * Supabase Configuration
           * Auto-generated from GitHub Secrets
           */

          window.SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          EOF

      - name: Verify config.js was created
        run: |
          echo "Checking if config.js exists..."
          if [ -f docs/config.js ]; then
            echo "config.js created successfully!"
            echo "File contents:"
            cat docs/config.js
          else
            echo "ERROR: config.js was not created!"
            exit 1
          fi

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
