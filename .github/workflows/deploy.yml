name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js from secrets
        run: |
          echo "/**" > docs/config.js
          echo " * Supabase Configuration" >> docs/config.js
          echo " * Auto-generated from GitHub Secrets" >> docs/config.js
          echo " */" >> docs/config.js
          echo "" >> docs/config.js
          echo "window.SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';" >> docs/config.js
          echo "window.SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';" >> docs/config.js

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
